name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy About Me site to EC2
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_KEY || '22'}}

      - name: Deploy site to EC2
        run: |
          ssh -o StrictHostKeyChecking=no "$EC2_USER@$EC2_HOST" "mkdir -p '$TARGET_DIR'"
          rsync -avz --delete "${{ github.workspace }}/index.html" "$EC2_USER@$EC2_HOST:$TARGET_DIR"
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          TARGET_DIR: ${{ secrets.EC2_TARGET_DIR || '/var/www/html' }}
